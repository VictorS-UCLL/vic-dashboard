name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: VictorS-UCLL
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/victors-ucll/vic420-portfolio:latest

      - name: Deploy to K3s
        run: |
          export KUBECONFIG=/home/vic/.kube/config
          kubectl rollout restart deployment portfolio
          kubectl rollout status deployment portfolio --timeout=120s
