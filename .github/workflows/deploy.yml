name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: VictorS-UCLL
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/victors-ucll/vic420-portfolio:latest

      - name: Deploy to K3s
        uses: actions-hub/kubectl@master
        env:
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          KUBE_HOST: ${{ secrets.KUBE_SERVER }}
          KUBE_CERTIFICATE: ""
        with:
          args: rollout restart deployment portfolio
